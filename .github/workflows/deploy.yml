name: Deploy

on:
  pull_request:
    branches:
      - dev
      - main
  
env:
  AWS_REGION: ${{ secrets.AWS_REGION }}                  # set this to your preferred AWS region, e.g. us-west-1
  ECR_REPOSITORY: my-next-app-dev           # set this to your Amazon ECR repository name
  ECS_SERVICE: vowerp3ui-dev-service                 # set this to your Amazon ECS service name
  ECS_CLUSTER: default                 # set this to your Amazon ECS cluster name
  ECS_TASK_DEFINITION: .aws/task-definition.json # set this to the path to your Amazon ECS task definition
                                               # file, e.g. .aws/task-definition.json
  CONTAINER_NAME: vowerp3ui-dev           # set this to the name of the container in the
                                               # containerDefinitions section of your task definition

jobs:
  test-and-deploy-dev:
    if: github.ref == 'refs/heads/dev' || (github.event_name == 'pull_request' && github.base_ref == 'dev')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install -g pnpm@latest && pnpm install

        #build docker image in the pipeline
      - name: Build Docker image
        run: docker build -t my-next-app-dev:latest -f Dockerfile .

        #test docker container in the pipeline and confirm if tests have passed
      # - name: Test Docker container
      #   run: docker run -d -p 3000:3000 my-next-app-dev:latest
      #   run: curl -f http://localhost:3000 || exit 1

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: latest
        run: |
          # Build a docker container and
          # push it to ECR so that it can
          # be deployed to ECS.
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # - name: Fill in the new image ID in the Amazon ECS task definition
      #   id: task-def
      #   uses: aws-actions/amazon-ecs-render-task-definition@v1
      #   with:
      #     task-definition: ${{ env.ECS_TASK_DEFINITION }}
      #     container-name: ${{ env.CONTAINER_NAME }}
      #     image: ${{ steps.build-image.outputs.image }}

      - name: Update ECS Task Definition
        run: |
          TASK_FAMILY="my-nextjs-task"
          NEW_IMAGE="782803702444.dkr.ecr.ap-south-1.amazonaws.com/my-next-app:latest
          TASK_DEF=$(aws ecs describe-task-definition --task-definition $TASK_FAMILY)
          echo "$TASK_DEF" | jq --arg newImage "$NEW_IMAGE" '.taskDefinition.containerDefinitions[0].image = $newImage' > new-task-def.json
          NEW_REVISION=$(aws ecs register-task-definition --cli-input-json file://new-task-def.json | jq -r '.taskDefinition.revision')
          echo "NEW_TASK_REVISION=$NEW_REVISION" >> $GITHUB_ENV

      - name: Stop Old Running Tasks
        run: |
          CLUSTER_NAME=defualt
          # Get the running task ID
          OLD_TASKS=$(aws ecs list-tasks --cluster --family my-nextjs-task --desired-status RUNNING | jq -r '.taskArns[]')
          echo "OLD_TASKS=$OLD_TASKS" >> $GITHUB_ENV
          # Stop the old tasks
          for TASK in $OLD_TASKS; do
          aws ecs stop-task --cluster default--task $TASK
          done

      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Test application availability
        run: |
          curl -f http://13.233.237.141:3000 || exit 1

